name: Deploy Daily Poster Packet

on:
  push:
    branches:
      - main
      - master
  workflow_dispatch:
    inputs:
      seed_database:
        description: Seed the production D1 database after migrations
        required: false
        default: false
        type: boolean

concurrency:
  group: cloudflare-production
  cancel-in-progress: false

permissions:
  contents: read

env:
  CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
  CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
  D1_DATABASE_ID: ${{ secrets.CLOUDFLARE_D1_DATABASE_ID }}
  D1_DATABASE_NAME: ${{ secrets.CLOUDFLARE_D1_DATABASE_NAME || 'daily-poster-packet-db' }}
  POSTER_ADMIN_TOKEN: ${{ secrets.POSTER_ADMIN_TOKEN }}
  GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
  PUBLIC_BASE_URL: ${{ secrets.PUBLIC_BASE_URL }}
  BUSINESS_TIMEZONE: ${{ secrets.BUSINESS_TIMEZONE || 'Asia/Kolkata' }}
  R2_BUCKET_NAME: ${{ secrets.R2_BUCKET_NAME || 'daily-poster-packet-assets' }}
  R2_PUBLIC_BASE_URL: ${{ secrets.R2_PUBLIC_BASE_URL }}

jobs:
  validate:
    name: Validate project
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Check formatting
        run: npm run format:check

      - name: Type check
        run: npm run typecheck

      - name: Run tests
        run: npm test

  deploy:
    name: Migrate D1 and deploy Worker
    needs: validate
    runs-on: ubuntu-latest
    environment:
      name: production

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Validate deployment configuration
        shell: bash
        run: |
          missing=0
          for variable in CLOUDFLARE_ACCOUNT_ID CLOUDFLARE_API_TOKEN POSTER_ADMIN_TOKEN GEMINI_API_KEY PUBLIC_BASE_URL; do
            if [ -z "${!variable}" ]; then
              echo "::error::$variable is not configured in GitHub repository secrets."
              missing=1
            fi
          done
          if [ "$missing" -ne 0 ]; then
            exit 1
          fi

      - name: Ensure D1 database and R2 bucket exist
        run: npm run cloudflare:ensure-resources

      - name: Apply production D1 migrations
        uses: cloudflare/wrangler-action@v3
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          accountId: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          command: d1 migrations apply ${{ env.D1_DATABASE_NAME }} --remote

      - name: Seed production D1 database
        if: ${{ github.event_name == 'workflow_dispatch' && inputs.seed_database }}
        uses: cloudflare/wrangler-action@v3
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          accountId: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          command: d1 execute ${{ env.D1_DATABASE_NAME }} --remote --file=./seed.sql

      - name: Deploy Worker and public poster pages
        id: deploy
        uses: cloudflare/wrangler-action@v3
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          accountId: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          command: deploy

      - name: Configure Worker secrets
        shell: bash
        env:
          POSTER_ADMIN_TOKEN: ${{ secrets.POSTER_ADMIN_TOKEN }}
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
        run: |
          for variable in POSTER_ADMIN_TOKEN GEMINI_API_KEY; do
            if [ -z "${!variable}" ]; then
              echo "::error::$variable is not configured as a GitHub repository secret."
              exit 1
            fi
          done
          printf '%s' "$POSTER_ADMIN_TOKEN" | npx wrangler secret put POSTER_ADMIN_TOKEN
          printf '%s' "$GEMINI_API_KEY" | npx wrangler secret put GEMINI_API_KEY

      - name: Print deployment result
        run: |
          echo "Daily Poster Packet deployed successfully."
          echo "The public URL is configured from the PUBLIC_BASE_URL GitHub secret."
